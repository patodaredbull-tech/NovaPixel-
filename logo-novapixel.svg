<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">NovaPixel — logo</title>
  <desc id="desc">Símbolo em forma de N formado por pixels, ao lado do nome NovaPixel.</desc>
  <defs>
    <linearGradient id="novaGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#20D9FF"/>
      <stop offset="52%" stop-color="#5A66FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pixel-N icon -->
  <g transform="translate(84 84)" fill="url(#novaGradient)">
    <rect x="0" y="0" width="72" height="72" rx="14"/>
    <rect x="0" y="82" width="72" height="72" rx="14"/>
    <rect x="0" y="164" width="72" height="72" rx="14"/>
    <rect x="0" y="246" width="72" height="72" rx="14"/>
    <rect x="82" y="82" width="72" height="72" rx="14"/>
    <rect x="164" y="164" width="72" height="72" rx="14"/>
    <rect x="246" y="0" width="72" height="72" rx="14"/>
    <rect x="246" y="82" width="72" height="72" rx="14"/>
    <rect x="246" y="164" width="72" height="72" rx="14"/>
    <rect x="246" y="246" width="72" height="72" rx="14"/>
    <rect x="328" y="-18" width="28" height="28" rx="6" opacity=".95" filter="url(#glow)"/>
    <rect x="372" y="26" width="18" height="18" rx="4" opacity=".7"/>
  </g>

  <!-- Wordmark -->
  <text x="550" y="298" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="174" font-weight="700" letter-spacing="-8" fill="#16213D">Nova</text>
  <text x="972" y="298" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="174" font-weight="700" letter-spacing="-8" fill="url(#novaGradient)">Pixel</text>
  <text x="560" y="368" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="32" font-weight="600" letter-spacing="9" fill="#63708C">DESIGN DIGITAL</text>
</svg>
